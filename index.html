<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAYARTOTO - Situs Resmi</title>
    <style>
        /* CSS Sederhana untuk Layout */
        body { margin: 0; font-family: sans-serif; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #1a1a1a;
            color: white;
        }

        .logo img {
            height: 50px; /* Sesuaikan ukuran logo */
        }

        .auth-buttons button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-login { background-color: #444; color: white; }
        .btn-daftar { background-color: #ffcc00; color: black; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="assets/layartoto_logo.png" alt="Logo Layartoto">
        </div>

        <div class="auth-buttons">
            <button class="btn-login">LOGIN</button>
            <button class="btn-daftar">DAFTAR</button>
        </div>
    </header>

</body>
</html>
